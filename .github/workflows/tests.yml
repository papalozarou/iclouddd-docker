# ------------------------------------------------------------------------------
# This workflow runs the unit test suite for pushes and pull requests.
#
# The workflow keeps CI simple on purpose: install runtime requirements, then
# run the existing unittest entrypoint in a clean runner environment.
# ------------------------------------------------------------------------------

name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - automations

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------------
      # Fetch the repository contents for test execution.
      # ------------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v6

      # ------------------------------------------------------------------------
      # Install the supported Python runtime for the worker and tests.
      # ------------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------------
      # Install runtime dependencies used by the worker modules.
      # ------------------------------------------------------------------------
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      # ------------------------------------------------------------------------
      # Run the full unittest suite exactly as used in local verification.
      # ------------------------------------------------------------------------
      - name: Run unit tests
        run: python3 -m unittest -q
